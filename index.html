<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard CASN 2024</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <h1>Dashboard Hasil CASN 2024</h1>

  <!-- CARD -->
  <div class="cards">
    <div class="card"><h2 id="total">0</h2><p>Total Peserta</p></div>
    <div class="card"><h2 id="lolos">0</h2><p>Lolos</p></div>
    <div class="card"><h2 id="tidak">0</h2><p>Tidak Lolos</p></div>
    <div class="card"><h2 id="max">0</h2><p>Tertinggi</p></div>
    <div class="card"><h2 id="min">0</h2><p>Terendah</p></div>
  </div>

  <div class="charts">
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>
</div>

  <!-- FILTER -->
  <div class="filters">
    <input type="text" id="search" placeholder="Cari nama...">

    <select id="status">
      <option value="">Semua Status</option>
      <option value="Lolos">Lolos</option>
      <option value="Tidak Lolos">Tidak Lolos</option>
    </select>

    <select id="pendidikan">
      <option value="">Semua Pendidikan</option>
      <option value="Agronomi">Agronomi</option>
      <option value="Agroteknologi">Agroteknologi</option>
      <option value="Peternakan">Peternakan</option>
      <option value="Dokter">Dokter</option>
    </select>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Nama</th>
        <th>JK</th>
        <th>Pendidikan</th>
        <th>TWK</th>
        <th>TIU</th>
        <th>TKP</th>
        <th>Total</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="script.js"></script>
</body>
</html>
